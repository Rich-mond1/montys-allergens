function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function buildMatrix(pg,q){
  const cols=ALIST;
  const items=pg.items.filter(it=>!q||it.name.toLowerCase().includes(q));
  if(!items.length)return`<div class="no-results"><span class="nr-icon">🔍</span>No dishes match your search.</div>`;
  const headCols=cols.map(a=>`<th style="border-top:2px solid ${a.color}"><div class="th-col"><span class="th-em">${a.emoji}</span><span class="th-lb">${esc(a.name)}</span></div></th>`).join("");
  const rows=items.map(it=>{
    const cells=cols.map(a=>{
      const cell=it.data[a.id];
      if(!cell?.on&&!cell?.trace)return`<td><div class="mcell"><span class="empty-cell">·</span></div></td>`;
      if(cell.trace&&!cell.on)return`<td style="background:rgba(251,191,36,.04)"><div class="mcell"><span class="msym t">~</span>${cell.note?`<span class="mnote">${esc(cell.note)}</span>`:""}</div></td>`;
      const sym=cell.trace?"~":"✓";const cls=cell.trace?"t":"c";
      return`<td style="background:${cell.trace?"rgba(251,191,36,.04)":"rgba(231,59,40,.04)"}"><div class="mcell"><span class="msym ${cls}">${sym}</span>${cell.note?`<span class="mnote">${esc(cell.note)}</span>`:""}</div></td>`;
    }).join("");
    return`<tr><td class="name-cell">${esc(it.name)}</td>${cells}</tr>`;
  }).join("");
  return`<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th class="name-hd">Dish / Item</th>${headCols}</tr></thead><tbody>${rows}</tbody></table></div>`;
}
function buildAllergenView(q){
  const results=[];
  PAGES.forEach(pg=>{pg.items.forEach(it=>{ALIST.forEach(a=>{const cell=it.data[a.id];if(cell?.on||cell?.trace){if(!q||a.name.toLowerCase().includes(q)||it.name.toLowerCase().includes(q)||pg.title.toLowerCase().includes(q)){results.push({a,it,pg,cell});}}});});});
  const byAllergen={};results.forEach(r=>{if(!byAllergen[r.a.id])byAllergen[r.a.id]={a:r.a,dishes:[]};byAllergen[r.a.id].dishes.push(r);});
  const cards=ALIST.filter(a=>byAllergen[a.id]).map(a=>{
    const entry=byAllergen[a.id];
    const drows=entry.dishes.map(r=>`<div class="dish-row"><div><div class="dish-name">${esc(r.it.name)}</div><div class="dish-page">${esc(r.pg.title)}</div></div><div style="display:flex;align-items:center;gap:6px;">${r.cell.note?`<span class="a-note">${esc(r.cell.note)}</span>`:""}<span class="status-badge ${(r.cell.trace&&!r.cell.on)?"t":"c"}">${(r.cell.trace&&!r.cell.on)?"MAY CONTAIN":"CONTAINS"}</span></div></div>`).join("");
    return`<div class="a-card"><div class="a-card-head" style="border-top:2px solid ${a.color}"><span class="a-card-emoji">${a.emoji}</span><span class="a-card-name">${esc(a.name)}</span><span class="a-card-count">${entry.dishes.length} dish${entry.dishes.length!==1?"es":""}</span></div><div class="a-card-body">${drows||'<div class="no-dishes">None found</div>'}</div></div>`;
  }).join("");
  if(!cards)return`<div class="no-results"><span class="nr-icon">🔍</span>No allergen data matches your search.</div>`;
  return`<div class="allergen-grid">${cards}</div>`;
}
function buildDishView(q){
  const allItems=[];PAGES.forEach(pg=>pg.items.forEach(it=>allItems.push({it,pg})));
  const filtered=allItems.filter(({it,pg})=>!q||it.name.toLowerCase().includes(q)||pg.title.toLowerCase().includes(q));
  if(!filtered.length)return`<div class="no-results"><span class="nr-icon">🔍</span>No dishes match your search.</div>`;
  const cards=filtered.map(({it,pg})=>{
    const hasAllergens=ALIST.some(a=>it.data[a.id]?.on||it.data[a.id]?.trace);
    const rows=ALIST.filter(a=>it.data[a.id]?.on||it.data[a.id]?.trace).map(a=>{const cell=it.data[a.id];const isTrace=cell.trace&&!cell.on;return`<div class="allergen-row"><span class="a-emoji">${a.emoji}</span><span class="a-name">${esc(a.name)}</span>${cell.note?`<span class="a-note">${esc(cell.note)}</span>`:""}<span class="status-badge ${isTrace?"t":"c"}">${isTrace?"MAY CONTAIN":"CONTAINS"}</span></div>`;}).join("");
    return`<div class="d-card"><div class="d-card-head"><div class="d-card-title">${esc(it.name)}</div><div class="d-card-page">${esc(pg.title)}</div></div><div class="d-card-body">${hasAllergens?rows:`<div class="no-allergens"><span class="safe-badge">✓ No declared allergens</span></div>`}</div></div>`;
  }).join("");
  return`<div class="dish-grid">${cards}</div>`;
}
render();
